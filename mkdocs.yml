  - Terminal UI:
    - user-guide/tui.md
    - Remote Trace Sources: user-guide/remote-trace-sources.md
  - SDK Guide:
    - user-guide/index.md
    - Decorators: user-guide/decorators.md
    - Configuration: user-guide/configuration.md
    - Exporters: user-guide/exporters.md
    - Processors: user-guide/processors.md
    - Multi-Tenancy: user-guide/multi-tenancy.md
    - Performance: user-guide/performance.md
    - Security: user-guide/security.md
  - Integrations:
    - integrations/index.md
    - LangChain: integrations/langchain.md
    - LlamaIndex: integrations/llamaindex.md
    - PydanticAI: integrations/pydantic-ai.md
    - Claude SDK: integrations/claude-sdk.md
    - Auto-Instrumentation: integrations/auto-instrumentation.md
    - OpenTelemetry Receiver: integrations/otel-receiver.md
    - Cloud Platforms: integrations/cloud-platforms.md
  - Deployment:
    - deployment/index.md
    - Production Configuration: deployment/production.md
    - AWS AgentCore: deployment/aws-agentcore.md
    - Azure AI Foundry: deployment/azure-foundry.md
    - GCP Vertex Agent: deployment/gcp-vertex-agent.md
    - Kubernetes: deployment/kubernetes.md
    - High Throughput: deployment/high-throughput.md
  - API Reference:
    - api/index.md
    - Core: api/core.md
    - Decorators: api/decorators.md
    - Exporters: api/exporters.md
    - Processors: api/processors.md
    - Adapters: api/adapters.md
    - Configuration: api/configuration.md
  - Reference:
    - Quick Reference: reference/quick-reference.md
  - FAQ: faq.md
  - Troubleshooting: troubleshooting.md
  - Contributing: contributing.md
  - Changelog: changelog.md
  - Glossary: glossary.md
  - Getting Help: getting-help.md

# Customization
extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/LocalAI/tracecraft
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/tracecraft/
  analytics:
    provider: google
    property: !ENV GOOGLE_ANALYTICS_KEY

extra_css:
  - stylesheets/extra.css
  - stylesheets/chat.css

extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

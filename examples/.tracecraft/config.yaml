# TraceCraft Configuration
# This file controls storage, exporters, instrumentation, and processors per environment.
#
# Configuration is loaded from (in order of precedence):
# 1. Explicit parameters passed to tracecraft.init()
# 2. Environment variables (TRACECRAFT_*)
# 3. .tracecraft/config.yaml in current directory
# 4. ~/.tracecraft/config.yaml
# 5. Default values
#
# Set environment via TRACECRAFT_ENV or the 'env' field below.

# Current environment (development, staging, production, test)
env: development

# Default settings (used when no environment-specific override)
default:
  # Service name shown in the TUI trace list and OTLP traces
  # Also reads from TRACECRAFT_SERVICE_NAME env var
  service_name: my-agent-service

  storage:
    # Storage backend type: jsonl, sqlite, mlflow, or none
    type: jsonl
    # Path for JSONL storage (relative to project root)
    jsonl_path: traces/tracecraft.jsonl

  exporters:
    # Real-time console output (pretty-printed summaries)
    console: true
    # JSONL file export (trace records)
    jsonl: true
    # OpenTelemetry Protocol export (Jaeger, Grafana, Langfuse, etc.)
    otlp: false
    # MLflow tracking server export
    mlflow: false
    # TraceCraft TUI receiver — stream traces to `tracecraft serve --tui`
    receiver: false
    receiver_endpoint: http://localhost:4318  # default TUI receiver address

  instrumentation:
    # Auto-instrument LLM SDKs and frameworks without decorators.
    # Also reads from TRACECRAFT_AUTO_INSTRUMENT env var.
    # Options:
    #   false         — disabled (default)
    #   true          — instrument all (openai, anthropic, langchain, llamaindex)
    #   [openai, langchain]  — specific providers only
    auto_instrument: false

  processors:
    # Enable PII/secret redaction
    redaction_enabled: false
    redaction_mode: mask  # mask, hash, or remove
    # Enable trace sampling
    sampling_enabled: false
    sampling_rate: 1.0  # 1.0 = 100% of traces
    # Enable automatic enrichment (git info, system info)
    enrichment_enabled: true

# Environment-specific overrides
environments:
  # Development: stream to local TUI receiver with auto-instrumentation
  development:
    storage:
      type: sqlite
      sqlite_path: traces/dev.db
      sqlite_wal_mode: true
    exporters:
      console: true
      jsonl: false
      receiver: true             # run: tracecraft serve --tui
      receiver_endpoint: http://localhost:4318
    instrumentation:
      auto_instrument: true      # instrument all available SDKs

  # Staging: SQLite with OTLP export, no receiver
  staging:
    storage:
      type: sqlite
      sqlite_path: traces/staging.db
    exporters:
      console: false
      jsonl: true
      otlp: true
      otlp_endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      receiver: false
    instrumentation:
      auto_instrument:
        - openai
        - anthropic
    processors:
      redaction_enabled: true
      redaction_mode: mask

  # Production: No local storage, OTLP export only, no receiver
  production:
    storage:
      type: none  # Don't store locally
    exporters:
      console: false
      jsonl: false
      otlp: true
      otlp_endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      otlp_headers:
        Authorization: Bearer ${OTEL_AUTH_TOKEN}
      receiver: false
    instrumentation:
      auto_instrument: false     # use decorators only in production
    processors:
      redaction_enabled: true
      redaction_mode: hash
      sampling_enabled: true
      sampling_rate: 0.1  # Sample 10% in production

  # Test: In-memory only, no exports, no instrumentation
  test:
    storage:
      type: none
    exporters:
      console: false
      jsonl: false
      otlp: false
      receiver: false
    instrumentation:
      auto_instrument: false
    processors:
      redaction_enabled: false
      sampling_enabled: false

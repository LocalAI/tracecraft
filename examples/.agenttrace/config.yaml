# AgentTrace Configuration
# This file controls storage, exporters, and processors per environment.
#
# Configuration is loaded from (in order of precedence):
# 1. Environment variables (AGENTTRACE_*)
# 2. .agenttrace/config.yaml in current directory
# 3. ~/.agenttrace/config.yaml
# 4. Default values
#
# Set environment via AGENTTRACE_ENV or the 'env' field below.

# Current environment (development, staging, production, test)
env: development

# Default settings (used when no environment-specific override)
default:
  storage:
    # Storage backend type: jsonl, sqlite, mlflow, or none
    type: jsonl
    # Path for JSONL storage (relative to project root)
    jsonl_path: traces/agenttrace.jsonl

  exporters:
    # Real-time console output (pretty-printed summaries)
    console: true
    # JSONL file export (trace records)
    jsonl: true
    # OpenTelemetry Protocol export
    otlp: false
    # MLflow tracking server export
    mlflow: false

  processors:
    # Enable PII/secret redaction
    redaction_enabled: false
    redaction_mode: mask  # mask, hash, or remove
    # Enable trace sampling
    sampling_enabled: false
    sampling_rate: 1.0  # 1.0 = 100% of traces
    # Enable automatic enrichment (git info, system info)
    enrichment_enabled: true

# Environment-specific overrides
environments:
  # Development: Local storage with console output
  development:
    storage:
      type: sqlite
      sqlite_path: traces/dev.db
      sqlite_wal_mode: true
    exporters:
      console: true
      jsonl: true

  # Staging: SQLite with OTLP export
  staging:
    storage:
      type: sqlite
      sqlite_path: traces/staging.db
    exporters:
      console: false
      jsonl: true
      otlp: true
      otlp_endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}
    processors:
      redaction_enabled: true
      redaction_mode: mask

  # Production: No local storage, OTLP export only
  production:
    storage:
      type: none  # Don't store locally
    exporters:
      console: false
      jsonl: false
      otlp: true
      otlp_endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      otlp_headers:
        Authorization: Bearer ${OTEL_AUTH_TOKEN}
    processors:
      redaction_enabled: true
      redaction_mode: hash
      sampling_enabled: true
      sampling_rate: 0.1  # Sample 10% in production

  # Test: In-memory only, no exports
  test:
    storage:
      type: none
    exporters:
      console: false
      jsonl: false
      otlp: false
    processors:
      redaction_enabled: false
      sampling_enabled: false

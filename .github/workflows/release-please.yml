name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        with:
          # RELEASE_PLEASE_TOKEN must be a PAT (classic: repo scope, or fine-grained:
          # Contents + Pull requests read/write). Required so that when Release Please
          # pushes the release tag, it triggers the release.yml workflow — pushes made
          # by GITHUB_TOKEN do NOT trigger other workflows (GitHub security restriction).
          # Without this secret the Release PR will still be created/updated, but the
          # tag push will not fire release.yml automatically.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

name: Question
description: Ask a question about usage or behavior
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question? We're happy to help! Please provide as much context as possible.

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
      placeholder: Your question...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to accomplish? This helps us provide better answers.
      placeholder: Describe what you're working on...

  - type: textarea
    id: tried
    attributes:
      label: What I've Tried
      description: Have you tried anything to find the answer?
      placeholder: |
        - Searched the documentation
        - Looked at existing issues
        - Tried X but got Y

  - type: input
    id: version
    attributes:
      label: Version
      description: What version are you using? (if relevant)
      placeholder: e.g., 0.1.0

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, code snippets, or screenshots here.
